<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Toko Elektronik Cepat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}

.header{
    background:#0d6efd;
    color:white;
    padding:20px;
    text-align:center;
}

.container-main{
    margin-top:20px;
}

.product-image{
    width:100%;
    height:350px;
    object-fit:contain;
    background:white;
    border-radius:10px;
    padding:10px;
}

.list-group-item{
    cursor:pointer;
}

.output{
    background:white;
    border-radius:10px;
    padding:15px;
    min-height:180px;
}

.form-area{
    background:white;
    padding:20px;
    border-radius:10px;
}

button{
    margin:5px;
}
</style>

</head>
<body>

<div class="header">
<h1>Toko Elektronik Cepat</h1>
<h5 id="jam"></h5>
</div>

<div class="container container-main">

<div class="row">

<div class="col-md-8">

<img id="gambarProduk" class="product-image">

<div class="text-center mt-3">
<button class="btn btn-secondary" onclick="gantiGambar(-1)">Previous</button>
<button class="btn btn-primary" onclick="gantiGambar(1)">Next</button>
</div>

<h3 id="namaProduk" class="mt-3"></h3>

<h4 id="hargaProduk" class="text-success"></h4>

</div>

<div class="col-md-4">

<h4>Daftar Produk</h4>

<ul class="list-group" id="daftarProduk">

</ul>

</div>

</div>

<hr>

<div class="row">

<div class="col-md-6">

<div class="form-area">

<h3>Form Pemesanan</h3>

<div class="mb-3">
<label>Nama Pemesan</label>
<input type="text" class="form-control" id="nama">
</div>

<div class="mb-3">
<label>Jumlah Pesan</label>
<input type="number" class="form-control" id="jumlah">
</div>

<div class="mb-3">
<label>Kode Promo</label>
<input type="text" class="form-control" id="promo">
</div>

<button class="btn btn-success" onclick="pesan()">Pesan Sekarang</button>

</div>

</div>

<div class="col-md-6">

<div class="output">

<h3>Struk Pemesanan</h3>

<div id="hasil"></div>

</div>

</div>

</div>

</div>

<script>

const produk=[

{
nama:"Laptop ASUS",
harga:8500000,
gambar:[
"https://images.unsplash.com/photo-1496181133206-80ce9b88a853",
"https://images.unsplash.com/photo-1517336714739-489689fd1ca8",
"https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2"
]
},

{
nama:"Smartphone Samsung",
harga:4500000,
gambar:[
"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",
"https://images.unsplash.com/photo-1598327105666-5b89351aff97",
"https://images.unsplash.com/photo-1580910051074-3eb694886505"
]
},

{
nama:"Headset Gaming",
harga:750000,
gambar:[
"https://images.unsplash.com/photo-1505740420928-5e560c06d30e",
"https://images.unsplash.com/photo-1546435770-a3e426bf472b",
"https://images.unsplash.com/photo-1484704849700-f032a568e944"
]
}

];

let produkAktif=0;
let gambarAktif=0;

function tampilProduk(){

document.getElementById("gambarProduk").src=produk[produkAktif].gambar[gambarAktif];

document.getElementById("namaProduk").innerHTML=produk[produkAktif].nama;

document.getElementById("hargaProduk").innerHTML=
"Rp "+produk[produkAktif].harga.toLocaleString();

}

function gantiGambar(arah){

gambarAktif+=arah;

if(gambarAktif<0){
gambarAktif=produk[produkAktif].gambar.length-1;
}

if(gambarAktif>=produk[produkAktif].gambar.length){
gambarAktif=0;
}

tampilProduk();

}

function tampilDaftar(){

let isi="";

for(let i=0;i<produk.length;i++){

isi+=`
<li class="list-group-item"
onclick="pilihProduk(${i})">
${produk[i].nama}
</li>
`;

}

document.getElementById("daftarProduk").innerHTML=isi;

}

function pilihProduk(index){

produkAktif=index;

gambarAktif=0;

tampilProduk();

}

function pesan(){

let nama=document.getElementById("nama").value;

let jumlah=document.getElementById("jumlah").value;

let promo=document.getElementById("promo").value.toUpperCase();

if(nama=="" || jumlah=="" || jumlah<=0){

alert("Nama dan jumlah harus diisi!");

return;

}

let subtotal=produk[produkAktif].harga*jumlah;

let diskon=0;

if(promo=="DISKON10"){

diskon=subtotal*0.10;

}

let total=subtotal-diskon;

let order="INV-"+Math.floor(Math.random()*90000+10000);

document.getElementById("hasil").innerHTML=`

<p><b>Order ID :</b> ${order}</p>

<p><b>Nama Pemesan :</b> ${nama}</p>

<p><b>Produk :</b> ${produk[produkAktif].nama}</p>

<p><b>Jumlah :</b> ${jumlah}</p>

<p><b>Subtotal :</b> Rp ${subtotal.toLocaleString()}</p>

<p><b>Potongan :</b> Rp ${diskon.toLocaleString()}</p>

<h4>Total Akhir : Rp ${total.toLocaleString()}</h4>

`;

}

function waktu(){

let sekarang=new Date();

document.getElementById("jam").innerHTML=
sekarang.toLocaleString("id-ID");

}

setInterval(waktu,1000);

waktu();

tampilProduk();

tampilDaftar();

</script>

</body>
</html>
